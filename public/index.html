<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VoxelWorld — Collaborative 3D Pixel Map</title>

  <!-- Leaflet -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>

  <!-- Three.js -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- Main app (no login required for now) -->
  <div id="app">

    <!-- Map base layer -->
    <div id="map"></div>

    <!-- Three.js canvas overlay -->
    <canvas id="canvas"></canvas>

    <!-- UI -->
    <div id="ui">
      <div id="top-bar">
        <div id="logo">🌍 VoxelWorld</div>
        <div id="user-info">
          <span id="user-name">Guest</span>
          <span id="user-cubes">0 cubes</span>
        </div>
      </div>

      <!-- Mode toggle -->
      <div id="mode-toggle">
        <button class="mode-btn active" id="btn-map-mode">🗺 Map</button>
        <button class="mode-btn" id="btn-voxel-mode">🧊 Voxels</button>
      </div>

      <!-- Palette (visible in voxel mode) -->
      <div id="palette-container" class="hidden">
        <div id="palette-label">Color</div>
        <div id="palette"></div>
      </div>

      <!-- Cooldown -->
      <div id="cooldown-container" class="hidden">
        <div id="cooldown-bar-wrap"><div id="cooldown-bar"></div></div>
        <div id="cooldown-text">Ready to place!</div>
      </div>

      <!-- Info -->
      <div id="info-box">
        <div id="info-coords">Hover a tile</div>
        <div id="info-height"></div>
        <div id="info-user"></div>
      </div>

      <div id="controls-hint">Drag: rotate · Scroll: zoom · Click: place cube</div>
    </div>
  </div>

  <script src="world.js"></script>
</body>
</html>
